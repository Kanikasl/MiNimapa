name: app_comunitaria
description: "Proyecto universitario"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.9.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  file_picker: ^10.3.3
  url_launcher: ^6.3.1
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/poro.jpg
    - assets/nimapalogo.jpg
    - assets/nimapa_logotipo.png
    - assets/perfil.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/nimapa_logotipo.png"